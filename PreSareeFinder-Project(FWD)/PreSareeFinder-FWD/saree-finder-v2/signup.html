<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    signup.html — New Customer Registration
    =========================================
    Allows new customers to create an account.
    After signup, they are logged in automatically
    and redirected to user-dashboard.html.

    NOTE: Admin accounts are pre-configured — admins cannot
    self-register. They use the admin tab on login.html.
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Hyderabad Saree Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Top bar -->
  <header class="auth-topbar">
    <div class="logo">🪷 Hyderabad Saree Finder</div>
  </header>

  <!-- Signup form -->
  <main class="auth-body">
    <div class="auth-card">

      <div class="auth-card-header">
        <h1>Create Account</h1>
        <p>Join thousands of saree shoppers in Hyderabad</p>
      </div>

      <div class="auth-card-body">

        <!-- Full name -->
        <div class="form-group">
          <label for="signupName">Full Name *</label>
          <input type="text" id="signupName" placeholder="e.g. Priya Sharma" autocomplete="name">
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="signupEmail">Email Address *</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="signupPhone">Phone Number *</label>
          <input type="tel" id="signupPhone" placeholder="+91 9876543210" autocomplete="tel">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="signupPass">Password *</label>
          <input type="password" id="signupPass" placeholder="At least 6 characters" autocomplete="new-password">
        </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label for="signupPass2">Confirm Password *</label>
          <input type="password" id="signupPass2" placeholder="Re-enter your password" autocomplete="new-password"
            onkeydown="if(event.key==='Enter') handleSignup()">
        </div>

        <!-- Error message -->
        <p class="form-error" id="signupError" style="display:none"></p>

        <!-- Submit -->
        <button class="btn-primary btn-block" onclick="handleSignup()">
          Create My Account →
        </button>

        <!-- Link to login -->
        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in →</a>
        </div>

      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Already logged in? Go to dashboard
    redirectIfLoggedIn();
  </script>

</body>
</html>
